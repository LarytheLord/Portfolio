<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan to connect — Abid Khan</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f7f4ec;
      --paper: #fffdf7;
      --ink: #161a22;
      --muted: #596273;
      --soft: #8790a0;
      --line: rgba(22, 26, 34, 0.1);
      --line-strong: rgba(22, 26, 34, 0.18);
      --blue: #2257d6;
      --amber: #b86500;
      --green: #16803d;
      --radius: 22px;
      --radius-sm: 14px;
      --shadow: 0 24px 70px rgba(44, 37, 25, 0.12);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      gap: 24px;
      padding: 32px 24px;
    }

    .header {
      text-align: center;
    }

    .eyebrow {
      color: var(--blue);
      font: 800 0.68rem 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 6px;
    }

    .name {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: var(--ink);
    }

    .subtitle {
      margin-top: 4px;
      font: 700 0.75rem 'JetBrains Mono', monospace;
      color: var(--soft);
      letter-spacing: 0.04em;
    }

    .qr-frame {
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--paper);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .qr-frame img {
      display: block;
      border-radius: 10px;
    }

    .url-pill {
      font: 700 0.78rem 'JetBrains Mono', monospace;
      color: var(--soft);
      background: var(--paper);
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 7px 16px;
      letter-spacing: 0.02em;
    }

    .cta {
      text-align: center;
    }

    .cta strong {
      display: block;
      font-size: 1rem;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .cta p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .back {
      font: 700 0.7rem 'JetBrains Mono', monospace;
      color: var(--soft);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.6;
      transition: opacity 0.15s;
    }

    .back:hover { opacity: 1; color: var(--blue); }
  </style>
</head>
<body>

  <div class="header">
    <p class="eyebrow">Founders meetup</p>
    <div class="name">Abid Khan</div>
    <div class="subtitle">Founder · Guild · AI/ML</div>
  </div>

  <!-- QR generated server-side — no JS required, always works -->
  <div class="qr-frame">
    <img
      src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=http%3A%2F%2Fabikhn.me%2FPortfolio%2Fpublic%2Fcard.html&bgcolor=fffdf7&color=161a22&margin=8&qzone=1"
      width="260"
      height="260"
      alt="QR code linking to Abid Khan's contact card"
    >
  </div>

  <div class="url-pill">abikhn.me/Portfolio/public/card.html</div>

  <div class="cta">
    <strong>Scan to connect</strong>
    <p>Get my details, Guild info &amp; links</p>
  </div>

  <a class="back" href="card.html">← back to card</a>

</body>
</html>
