<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Abid Khan — Founder, Guild</title>
  <meta name="description" content="Abid Khan — Founder of Guild, AI/ML & Full-Stack builder.">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0A0A0A;
      --surface: #141414;
      --surface-2: #1C1C1C;
      --border: rgba(255,255,255,0.08);
      --border-accent: rgba(255,107,58,0.35);
      --orange: #FF6B3A;
      --orange-dim: rgba(255,107,58,0.12);
      --orange-glow: rgba(255,107,58,0.20);
      --text: #F2F2F2;
      --text-secondary: #888;
      --text-muted: #555;
      --font: 'Space Grotesk', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 20px;
    }

    /* subtle ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -30vh;
      left: 50%;
      transform: translateX(-50%);
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(255,107,58,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Identity ── */
    .identity {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .name {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .title {
      font-size: 0.95rem;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .title span {
      color: var(--orange);
    }

    /* ── Guild feature card ── */
    .guild-card {
      background: var(--surface-2);
      border: 1px solid var(--border-accent);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-decoration: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .guild-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top left, var(--orange-dim), transparent 60%);
      pointer-events: none;
    }

    .guild-card:hover {
      border-color: rgba(255,107,58,0.6);
      box-shadow: 0 0 32px var(--orange-glow);
    }

    .guild-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .guild-icon {
      width: 36px;
      height: 36px;
      background: var(--orange);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .guild-name-row {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .guild-label {
      font-size: 0.72rem;
      font-family: var(--mono);
      color: var(--orange);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .guild-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .guild-tagline {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .guild-cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .guild-url {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--orange);
      letter-spacing: 0.01em;
    }

    .guild-arrow {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--orange);
      transition: gap 0.2s;
    }

    .guild-card:hover .guild-arrow {
      gap: 10px;
    }

    /* ── Socials ── */
    .socials {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .social-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .social-btn:hover {
      border-color: var(--border-accent);
      background: var(--surface);
    }

    .social-icon {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .social-icon svg {
      width: 20px;
      height: 20px;
      fill: var(--text-secondary);
      transition: fill 0.2s;
    }

    .social-btn:hover .social-icon svg {
      fill: var(--text);
    }

    .social-label {
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .social-btn:hover .social-label {
      color: var(--text-secondary);
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .portfolio-link {
      font-size: 0.75rem;
      font-family: var(--mono);
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .portfolio-link:hover {
      color: var(--text-secondary);
    }

    .qr-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      font-family: var(--font);
      text-decoration: none;
    }

    .qr-btn:hover {
      color: var(--text-secondary);
      border-color: rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>

<div class="card">
