<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Abid Khan — Founder, Guild</title>
  <meta name="description" content="Abid Khan — Founder of Guild, AI/ML & Full-Stack builder.">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f7f4ec;
      --paper: #fffdf7;
      --panel: rgba(255, 253, 247, 0.82);
      --panel-2: #f0eadf;
      --ink: #161a22;
      --muted: #596273;
      --soft: #8790a0;
      --line: rgba(22, 26, 34, 0.1);
      --line-strong: rgba(22, 26, 34, 0.18);
      --blue: #2257d6;
      --green: #16803d;
      --amber: #b86500;
      --radius: 22px;
      --radius-sm: 14px;
      --shadow: 0 24px 70px rgba(44, 37, 25, 0.12);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 20px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--paper) 0%, rgba(240, 234, 223, 0.94) 100%);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── Header ── */
    .card-head {
      padding: 24px 24px 0;
    }

    .eyebrow {
      color: var(--blue);
      font: 800 0.66rem 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 8px;
    }

    .name {
      font-size: 2rem;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.05em;
      line-height: 1.05;
    }

    .role {
      margin-top: 5px;
      color: var(--soft);
      font: 700 0.75rem 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
    }

    /* ── Guild card ── */
    .guild-block {
      display: block;
      margin: 18px 24px;
      border: 1px solid rgba(34, 87, 214, 0.16);
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, rgba(34, 87, 214, 0.07), rgba(22, 128, 61, 0.04));
      padding: 16px;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .guild-block:hover {
      border-color: rgba(34, 87, 214, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(34, 87, 214, 0.1);
    }

    .guild-kicker {
      color: var(--amber);
      font: 800 0.62rem 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
    }

    .guild-name {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.04em;
    }

    .guild-desc {
      margin-top: 7px;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .guild-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }

    .guild-url {
      font: 700 0.72rem 'JetBrains Mono', monospace;
      color: var(--blue);
    }

    .guild-cta {
      font: 800 0.72rem 'JetBrains Mono', monospace;
      color: var(--blue);
    }

    /* ── Socials ── */
    .socials {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      border-top: 1px solid var(--line);
      background: var(--line);
    }

    .social-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 6px;
      background: var(--paper);
      text-decoration: none;
      transition: 0.15s ease;
    }

    .social-btn:hover {
      background: rgba(34, 87, 214, 0.06);
    }

    .social-btn svg {
      width: 17px;
      height: 17px;
      fill: var(--soft);
      transition: fill 0.15s ease;
    }

    .social-btn:hover svg { fill: var(--blue); }

    .social-btn span {
      font: 700 0.6rem 'JetBrains Mono', monospace;
      color: var(--soft);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .social-btn:hover span { color: var(--blue); }

    /* ── Footer row ── */
    .card-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px 14px;
      border-top: 1px solid var(--line);
      background: rgba(240, 234, 223, 0.5);
    }

    .foot-domain {
      font: 700 0.68rem 'JetBrains Mono', monospace;
      color: var(--soft);
    }

    .foot-qr {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font: 700 0.66rem 'JetBrains Mono', monospace;
      color: var(--soft);
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 4px 10px;
      text-decoration: none;
      transition: 0.15s ease;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .foot-qr:hover { color: var(--blue); border-color: var(--blue); }
  </style>
</head>
